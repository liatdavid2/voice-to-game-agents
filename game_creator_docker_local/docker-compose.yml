services:
  game-creator:
    build: .
    container_name: magic-game-creator
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      REPO_PATH: /app/workspace
      PUBLISH_TO_GIT: "${PUBLISH_TO_GIT:-false}"
      GENERATE_IMAGES: "${GENERATE_IMAGES:-false}"
      IMAGE_MODEL: "${IMAGE_MODEL:-gpt-image-1-mini}"
      IMAGE_MAX_SIZE: "${IMAGE_MAX_SIZE:-256}"
      IMAGE_QUALITY: "${IMAGE_QUALITY:-80}"
      MAX_IMAGE_ROLES: "${MAX_IMAGE_ROLES:-2}"
      HOST: 0.0.0.0
      PORT: "5000"
    volumes:
      - ./workspace:/app/workspace
    restart: unless-stopped
